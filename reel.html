  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red:   #e33e3e;
      --black: #080808;
      --white: #f0ede6;
      --muted: rgba(240,237,230,0.45);
    }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    #cur, #cur-ring { display: none; }

    /* ─── Nav ─── */
    nav {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      padding: 28px 52px;
      display: flex; justify-content: space-between; align-items: center;
      mix-blend-mode: difference;
      pointer-events: none;
    }
    nav .nav-logo, nav .nav-links a { pointer-events: all; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 24px; display: block; }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a {
      font-size: .68rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--white); text-decoration: none; position: relative;
      display: inline-flex; align-items: center; overflow: hidden;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--red); transition: width .3s ease;
    }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: var(--red); }

    /* ─── Stage ─── */
    #stage { position: fixed; inset: 0; }
    #stage iframe { width: 100%; height: 100%; display: block; border: none; }

    @media (max-width: 900px) {
      nav { padding: 20px 24px; }
      .nav-links { gap: 20px; }
    }
    @media (pointer: coarse) {
    }
  </style>
</head>
<body>


<nav>
  <a href="index.html" class="nav-logo"><img src="brand_assets/LOGO.png" alt="Elaine Chen"></a>
  <div class="nav-links">
    <a class="active">Reel</a>
    <a href="about.html">About</a>
  </div>
</nav>

<div id="stage">
  <iframe id="reel-frame" src="https://player.vimeo.com/video/1201241786?title=0&byline=0&portrait=0&badge=0&autopause=0&app_id=58479"
    frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    title="2025 Elaine Chen Demoreel"></iframe>
</div>

<script>
// Autoplay if redirected from hero click
if (new URLSearchParams(location.search).get('play') === '1') {
  const fr = document.getElementById('reel-frame');
  fr.src = fr.src + '&autoplay=1&muted=0';
}

// Letter swap — flex column slide
function initLetterSwap(el) {
  const text = el.textContent.trim();

  // Measure actual rendered letter height
  const probe = document.createElement('span');
  probe.style.cssText = 'display:inline-block;visibility:hidden;position:absolute;pointer-events:none;white-space:nowrap;';
  probe.textContent = 'X';
  document.body.appendChild(probe);
  const h = probe.offsetHeight;
  document.body.removeChild(probe);

  el.innerHTML = '';
  const STAGGER = 30, DUR = 580, EASE = 'cubic-bezier(0.16,1,0.3,1)';
  const cols = [];

  [...text].forEach(char => {
    if (char === ' ') {
      const sp = document.createElement('span');
      sp.innerHTML = '&nbsp;';
      el.appendChild(sp);
      return;
    }
    const wrap = document.createElement('span');
    wrap.style.cssText = `display:inline-block;overflow:hidden;height:${h}px;vertical-align:middle;`;

    const col = document.createElement('span');
    col.style.cssText = `display:flex;flex-direction:column;transform:translateY(-${h}px);`;

    // b = secondary (top slot, hidden above, slides into view on hover)
    const b = document.createElement('span');
    b.textContent = char;
    b.setAttribute('aria-hidden', 'true');
    b.style.cssText = `display:block;height:${h}px;line-height:${h}px;flex-shrink:0;text-align:center;`;

    // a = primary (bottom slot, visible initially, slides down out on hover)
    const a = document.createElement('span');
    a.textContent = char;
    a.style.cssText = `display:block;height:${h}px;line-height:${h}px;flex-shrink:0;text-align:center;`;

    col.append(b, a);
    wrap.appendChild(col);
    el.appendChild(wrap);
    cols.push(col);
  });

  let busy = false;
  el.addEventListener('mouseenter', () => {
    if (busy) return;
    busy = true;
    cols.forEach((col, i) => {
      setTimeout(() => {
        col.style.transition = `transform ${DUR}ms ${EASE}`;
        col.style.transform = 'translateY(0)';
      }, i * STAGGER);
    });
    setTimeout(() => {
      cols.forEach(col => {
        col.style.transition = 'none';
        col.style.transform = `translateY(-${h}px)`;
      });
      busy = false;
    }, (cols.length - 1) * STAGGER + DUR + 100);
  });
}

document.fonts.ready.then(() => {
  document.querySelectorAll('.nav-links a').forEach(el => initLetterSwap(el));
});
</script>
</body>
</html>
