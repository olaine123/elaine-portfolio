  <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red:   #e33e3e;
      --black: #080808;
      --white: #f0ede6;
      --muted: rgba(240,237,230,0.45);
    }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    #cur, #cur-ring { display: none; }

    /* --- Nav --- */
    nav {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      padding: 28px 52px;
      display: flex; justify-content: space-between; align-items: center;
      mix-blend-mode: difference;
      pointer-events: none;
    }
    nav .nav-logo, nav .nav-links a { pointer-events: all; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 24px; display: block; }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a {
      font-size: .68rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--white); text-decoration: none; position: relative;
      display: inline-flex; align-items: center;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--red); transition: width .3s ease;
    }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: var(--red); }

    /* --- Stage --- */
    #stage { position: fixed; inset: 0; }
    #stage iframe { width: 100%; height: 100%; display: block; border: none; }

    @media (max-width: 900px) {
      nav { padding: 20px 24px; }
      .nav-links { gap: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="brand_assets/LOGO.png" alt="Elaine Chen"></a>
  <div class="nav-links">
    <a class="active">Reel</a>
    <a href="about.html">About</a>
  </div>
</nav>

<div id="stage">
  <iframe id="reel-frame" src="https://player.vimeo.com/video/1201241786?title=0&byline=0&portrait=0&badge=0&autopause=0&app_id=58479"
    frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    title="2025 Elaine Chen Demoreel"></iframe>
</div>

<script>
// Autoplay if redirected from hero click
if (new URLSearchParams(location.search).get('play') === '1') {
  const fr = document.getElementById('reel-frame');
  fr.src = fr.src + '&autoplay=1&muted=0';
}

// Letter swap — structure mirrors React LetterSwapForward exactly:
// overflow:hidden on the outer wrapper, no clip-path (clip-path breaks inside
// mix-blend-mode parents in Safari), primary exits via transform, secondary via top.
function initLetterSwap(el) {
  const text = el.textContent.trim();
  if (!text) return;
  el.innerHTML = '';

  // Inner container with overflow:hidden — equivalent to the React component's outer <span>
  // Nested inside 'el' so ::after pseudo-elements on 'el' still render outside the clip
  const inner = document.createElement('span');
  inner.style.cssText = 'display:inline-flex;overflow:hidden;vertical-align:middle;';
  el.appendChild(inner);

  const STAGGER = 30, DUR = 580, EASE = 'cubic-bezier(0.16,1,0.3,1)';
  const items = [];

  [...text].forEach((char, idx) => {
    const c = char;
    const wrap = document.createElement('span');
    wrap.style.cssText = 'white-space:pre;position:relative;display:inline-flex;';

    const primary = document.createElement('span');
    primary.textContent = c;
    primary.style.cssText = 'position:relative;display:block;';

    const secondary = document.createElement('span');
    secondary.textContent = c;
    secondary.setAttribute('aria-hidden', 'true');
    secondary.style.cssText = 'position:absolute;top:-100%;left:0;display:block;width:100%;';

    wrap.append(primary, secondary);
    inner.appendChild(wrap);
    items.push({ primary, secondary, delay: idx * STAGGER });
  });

  let busy = false;
  el.addEventListener('mouseenter', () => {
    if (busy) return;
    busy = true;
    items.forEach(({ primary, secondary, delay }) => {
      setTimeout(() => {
        primary.style.transition = 'transform ' + DUR + 'ms ' + EASE;
        primary.style.transform = 'translateY(100%)';
        secondary.style.transition = 'top ' + DUR + 'ms ' + EASE;
        secondary.style.top = '0%';
      }, delay);
    });
    setTimeout(() => {
      items.forEach(({ primary, secondary }) => {
        primary.style.transition = 'none'; primary.style.transform = '';
        secondary.style.transition = 'none'; secondary.style.top = '-100%';
      });
      busy = false;
    }, (items.length - 1) * STAGGER + DUR + 100);
  });
}

document.fonts.ready.then(() => {
  document.querySelectorAll('.nav-links a').forEach(el => initLetterSwap(el));
});
</script>
</body>
</html>
