<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — Elaine Chen</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KENVXXSRHL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KENVXXSRHL');
  </script>
  <link rel="icon" href="brand_assets/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red:   #e33e3e;
      --black: #080808;
      --white: #f0ede6;
      --dark:  #101010;
      --card:  #151515;
      --line:  #222222;
      --muted: rgba(240,237,230,0.45);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      overflow-x: hidden; cursor: none;
    }

    /* ─── Cursor ─── */
    #cur {
      position: fixed; z-index: 9999; width: 10px; height: 10px;
      background: var(--red); border-radius: 50%; pointer-events: none;
      transform: translate(-50%,-50%); transition: width .15s, height .15s;
      mix-blend-mode: difference;
    }
    #cur-ring {
      position: fixed; z-index: 9998; width: 38px; height: 38px;
      border: 1px solid rgba(227,62,62,.45); border-radius: 50%; pointer-events: none;
      transform: translate(-50%,-50%);
      transition: left .1s ease, top .1s ease, width .25s, height .25s;
    }
    body.hovering #cur      { width: 18px; height: 18px; }
    body.hovering #cur-ring { width: 58px; height: 58px; }

    /* ─── Nav ─── */
    nav {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      padding: 28px 52px;
      display: flex; justify-content: space-between; align-items: center;
      mix-blend-mode: difference;
    }
    .nav-logo {
      display: flex; align-items: center; text-decoration: none;
    }
    .nav-logo img { height: 24px; display: block; }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a {
      font-size: .68rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--white); text-decoration: none; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--red); transition: width .3s ease;
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: var(--red); }

    /* ─── Page Header ─── */
    .page-header {
      padding: 160px 52px 80px;
      border-bottom: 1px solid var(--line);
    }
    .s-label {
      font-size: .62rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--red); margin-bottom: 14px;
    }
    .s-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3.5rem, 9vw, 9rem);
      line-height: .88; letter-spacing: -.02em; text-transform: uppercase;
    }
    .works-count {
      font-size: .65rem; letter-spacing: .15em; color: var(--line);
      margin-top: 20px;
    }

    /* ─── Works Grid ─── */
    @keyframes gridFadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .grid-fade { animation: gridFadeIn .45s ease forwards; }
    .works-section { padding: 3px 0 0; }
    .w2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .w2-grid .work-card { aspect-ratio: 16/9; }

    /* ─── Playground Cards (unchanged) ─── */
    .work-card { position: relative; overflow: hidden; background: var(--card); cursor: none; }
    .work-thumb {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(15%); transition: transform .65s ease, filter .4s ease;
    }
    .work-card:hover .work-thumb { filter: grayscale(0%); }
    .work-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; letter-spacing: .2em; color: #2a2a2a; background: var(--card);
    }
    .work-card-overlay {
      position: absolute; inset: 0; background: rgba(8,8,8,0);
      display: flex; align-items: flex-end; padding: 28px;
      transition: background .4s ease;
    }
    .work-card:hover .work-card-overlay { background: rgba(8,8,8,.78); }
    .work-card:hover .work-thumb { transform: scale(1.04); }
    .work-thumb--zoom { transform: scale(1.2); transform-origin: center 65%; }
    .work-card:hover .work-thumb--zoom { transform: scale(1.24); transform-origin: center 65%; }
    .work-meta { transform: translateY(12px); opacity: 0; transition: transform .4s ease, opacity .35s ease; }
    .work-card:hover .work-meta { transform: translateY(0); opacity: 1; }
    .work-num { font-size: .58rem; letter-spacing: .22em; color: var(--red); margin-bottom: 5px; }
    .work-title {
      font-family: 'Anton', sans-serif; font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      text-transform: uppercase; letter-spacing: .01em; line-height: 1;
    }
    .work-type { font-size: .65rem; letter-spacing: .1em; color: var(--muted); margin-top: 6px; }
    .work-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 0; height: 3px; background: var(--red); transition: width .4s ease;
    }
    .work-card:hover::after { width: 60px; }

    /* ─── More Projects Nav ─── */
    .detail-more-projects { padding: 40px 52px 60px; border-top: 1px solid var(--line); margin-top: 60px; }
    .dmp-label { font-size: .62rem; letter-spacing: .3em; text-transform: uppercase; color: var(--red); margin-bottom: 28px; text-align: center; }
    .dmp-nav { display: grid; grid-template-columns: 1fr 1fr; }
    .dmp-item { padding: 20px 0; cursor: none; position: relative; border-top: 1px solid var(--line); }
    .dmp-item:first-child { padding-right: 52px; border-right: 1px solid var(--line); }
    .dmp-item:last-child { padding-left: 52px; text-align: right; }
    .dmp-dir { font-size: .6rem; letter-spacing: .25em; text-transform: uppercase; color: #444; margin-bottom: 16px; }
    .dmp-title {
      font-family: 'Anton', sans-serif; font-size: clamp(1.5rem, 2.5vw, 2.6rem);
      text-transform: uppercase; letter-spacing: -.01em; line-height: 1;
      color: var(--white); transition: color .25s ease;
    }
    .dmp-title-wrap { display: flex; align-items: flex-start; gap: 12px; }
    .dmp-title-wrap--right { justify-content: flex-end; }
    .dmp-arrow { flex-shrink: 0; font-family: 'Anton', sans-serif; font-size: clamp(1.5rem, 2.5vw, 2.6rem); line-height: 1; color: var(--white); transition: color .25s ease; }
    .dmp-item:hover .dmp-arrow { color: var(--red); }
    .dmp-item:hover .dmp-title { color: var(--red); }
    .dmp-type { font-size: .68rem; letter-spacing: .1em; color: var(--muted); margin-top: 10px; }
    .dmp-thumb {
      position: absolute; bottom: calc(100% + 16px); left: 0;
      width: 280px; aspect-ratio: 16/9; overflow: hidden; background: var(--card);
      opacity: 0; transform: translateY(10px);
      transition: opacity .3s ease, transform .3s ease;
      pointer-events: none; border: 1px solid rgba(255,255,255,.08); z-index: 10;
    }
    .dmp-item:last-child .dmp-thumb { left: auto; right: 0; }
    .dmp-item:hover .dmp-thumb { opacity: 1; transform: translateY(0); }
    .dmp-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ─── Chair Scatter ─── */
    #detail-main { position: relative; }
    #chair-scatter { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    #chair-scatter img { position: absolute; pointer-events: none; display: block; }

    /* ─── Chair Flipbook ─── */
    #chair-strip {
      position: fixed;
      left: 20px; top: 160px;
      width: 240px;
      z-index: 350; pointer-events: none;
      opacity: 0; transition: opacity .5s ease;
    }
    #chair-strip.visible { opacity: 1; }
    #chair-frame-img { width: 100%; display: block; }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--line); padding: 80px 52px 40px;
      background: var(--black);
    }
    .foot-main { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-bottom: 80px; }
    .foot-nav { display: flex; flex-direction: column; }
    .foot-nav a {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.8rem, 5vw, 5rem);
      line-height: 1; letter-spacing: -.02em; text-transform: uppercase;
      color: var(--white); text-decoration: none;
      transition: color .2s ease; padding-bottom: 6px;
    }
    .foot-nav a:hover { color: var(--red); }
    .foot-info { display: flex; flex-direction: column; gap: 20px; padding-top: 12px; }
    .foot-contact-item { display: flex; flex-direction: column; gap: 3px; }
    .foot-contact-label {
      font-size: .6rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--red);
    }
    .foot-contact-row {
      font-family: "Elms Sans", sans-serif;
      font-size: 1.05rem; line-height: 1.4; color: var(--muted);
      text-decoration: none; transition: color .2s ease;
    }
    .foot-contact-row:hover { color: var(--white); }
    .foot-bottom {
      border-top: 1px solid var(--line); padding-top: 28px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .foot-copy { font-size: .8rem; letter-spacing: .08em; color: #444; }
    .foot-top {
      font-size: .8rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color .2s ease;
    }
    .foot-top:hover { color: var(--red); }

    /* ─── Project Detail Overlay ─── */
    #detail {
      position: fixed; inset: 0; z-index: 300;
      background: var(--black); overflow-y: auto;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform .65s cubic-bezier(.76,0,.24,1);
    }
    #detail.open { transform: translateY(0); }
    .detail-topbar {
      position: sticky; top: 0; z-index: 10; padding: 22px 52px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(8,8,8,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .detail-back {
      display: flex; align-items: center; gap: 14px;
      font-size: .7rem; letter-spacing: .16em; text-transform: uppercase;
      color: var(--white); text-decoration: none; cursor: none; transition: color .2s ease;
    }
    .detail-back:hover { color: var(--red); }
    .back-line {
      width: 32px; height: 1px; background: currentColor; position: relative;
      transition: width .3s ease;
    }
    .detail-back:hover .back-line { width: 50px; }
    .back-line::before {
      content: ''; position: absolute; left: 0; top: -4px; width: 8px; height: 8px;
      border-left: 1px solid currentColor; border-bottom: 1px solid currentColor;
      transform: rotate(45deg);
    }
    .detail-counter { font-size: .65rem; letter-spacing: .18em; color: #444; }
    .detail-body { padding: 60px 52px; max-width: 1440px; margin: 0 auto; }
    .detail-label {
      font-size: .82rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--red); margin-bottom: 14px;
    }
    .detail-title {
      font-family: 'Anton', sans-serif; font-size: clamp(3rem, 7vw, 8rem);
      text-transform: uppercase; line-height: .88; letter-spacing: -.02em; margin-bottom: 48px;
    }
    .detail-video-wrap {
      position: relative; width: 100%; padding-bottom: 56.25%;
      background: var(--card); margin-bottom: 60px;
    }
    .detail-video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
    .detail-stacked-video { margin-bottom: 60px; }
    .video-stack { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 32px; }
    .stack-card {
      position: absolute; inset: 0;
      transition: transform .5s cubic-bezier(.25,.46,.45,.94), box-shadow .4s ease, opacity .4s ease;
      cursor: pointer; background: var(--card);
      border: 1px solid rgba(255,255,255,.04);
    }
    .stack-card[data-pos="0"] {
      z-index: 3; transform: translateY(0) scale(1); cursor: default;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }
    .stack-card[data-pos="1"] {
      z-index: 2; transform: translateY(14px) scale(0.97); opacity: .82;
    }
    .stack-card[data-pos="2"] {
      z-index: 1; transform: translateY(26px) scale(0.94); opacity: .64;
    }
    .stack-card iframe { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .stack-card:not([data-pos="0"]) iframe { pointer-events: none; }
    .stack-tabs { display: flex; gap: 8px; margin-top: 20px; }
    .stack-tab {
      font-family: 'IBM Plex Mono', monospace; font-size: .7rem;
      letter-spacing: .2em; text-transform: uppercase;
      padding: 8px 20px; border: 1px solid var(--line);
      background: transparent; color: var(--muted); cursor: pointer;
      transition: border-color .25s ease, color .25s ease;
    }
    .stack-tab.active { border-color: var(--red); color: var(--red); }
    .stack-tab:hover:not(.active) { border-color: var(--white); color: var(--white); }
    .detail-loop-videos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 60px; }
    .detail-loop-videos video { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; pointer-events: none; }
    .detail-hero-images {
      display: none; grid-template-columns: repeat(3, 1fr);
      gap: 4px; margin-bottom: 60px;
    }
    .detail-hero-images.show { display: grid; }
    .detail-hero-images img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; cursor: none; transition: transform .3s ease; }
    .detail-hero-images img:hover { transform: scale(1.04); }
    .transcripts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 52px; }
    .transcript-label { font-family: 'IBM Plex Mono', monospace; font-size: .7rem; letter-spacing: .18em; color: var(--red); margin-bottom: 10px; }
    .transcript-body { font-family: 'Elms Sans', sans-serif; font-size: .92rem; line-height: 1.75; color: var(--muted); }
    .detail-info { display: grid; grid-template-columns: 2fr 1fr; gap: 60px; margin-bottom: 80px; }
    .detail-desc {
      font-family: "Elms Sans", sans-serif; font-optical-sizing: auto;
      font-size: 1.25rem; line-height: 1.9; color: rgba(240,237,230,.75);
      white-space: pre-line;
    }
    .detail-specs { border-top: 1px solid var(--line); padding-top: 22px; }
    .spec-row { margin-bottom: 22px; }
    .spec-label {
      font-size: .75rem; letter-spacing: .22em; text-transform: uppercase;
      color: var(--red); margin-bottom: 4px;
    }
    .spec-val { font-size: 1rem; color: var(--white); }
    .detail-illustration { margin-bottom: 60px; display: flex; justify-content: center; }
    .detail-illustration img { max-width: 120px; width: 10%; filter: drop-shadow(0 0 40px rgba(227,62,62,.15)); }
    .detail-deco { margin: 40px 0 60px; display: flex; justify-content: center; }
    .detail-deco img { max-width: 420px; width: 37.5%; }
    .process-section { margin-bottom: 52px; }
    .process-section-label {
      font-size: .75rem; letter-spacing: .22em; text-transform: uppercase;
      color: var(--red); margin-bottom: 20px;
    }
    .process-section-grid { display: grid; gap: 3px; }
    .process-section-grid img { width: 100%; height: auto; display: block; }
    .process-cap { font-size: .8rem; letter-spacing: .16em; text-transform: uppercase; color: #444; margin-top: 10px; }
    .process-two-col {
      display: grid; grid-template-columns: 1fr 2fr; gap: 24px; margin-bottom: 52px;
    }
    .yt-lyrics-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
    .process-two-col-left .process-section,
    .process-two-col-right .process-section { margin-bottom: 16px; }
    .process-two-col-right { display: flex; flex-direction: column; padding-left: 48px; }
    .detail-footer { border-top: 1px solid var(--line); padding: 80px 52px 40px; }

    /* ─── Lightbox ─── */
    #lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(5,5,5,.96);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .35s ease;
    }
    #lightbox::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: var(--red);
    }
    #lightbox.lb-open { opacity: 1; pointer-events: all; }
    #lb-stage {
      flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
      padding: 72px 80px 20px; min-height: 0;
    }
    #lb-img {
      max-width: 100%; max-height: 100%; object-fit: contain;
      opacity: 0; transform: scale(.97);
      transition: opacity .4s ease, transform .4s cubic-bezier(.16,1,.3,1);
    }
    #lb-img.lb-vis { opacity: 1; transform: scale(1); }
    #lb-video {
      max-width: 100%; max-height: 100%; object-fit: contain;
      display: none; outline: none; background: var(--black);
    }
    #lb-close {
      position: absolute; top: 24px; right: 36px;
      width: 40px; height: 40px;
      background: transparent; border: 1px solid rgba(240,237,230,.2); border-radius: 50%;
      cursor: none; display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s;
    }
    #lb-close::before, #lb-close::after {
      content: ''; position: absolute;
      width: 14px; height: 1px; background: var(--white); border-radius: 1px;
    }
    #lb-close::before { transform: rotate(45deg); }
    #lb-close::after  { transform: rotate(-45deg); }
    #lb-close:hover   { border-color: var(--red); background: rgba(227,62,62,.12); }
    #lb-footer {
      width: 100%; padding: 16px 80px 32px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; position: relative;
    }
    #lb-info {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      pointer-events: none; text-align: center;
    }
    #lb-group   { font-size: .58rem; letter-spacing: .32em; text-transform: uppercase; color: var(--red); }
    #lb-counter { font-size: .72rem; letter-spacing: .16em; color: var(--muted); }
    #lb-prev, #lb-next {
      background: transparent; border: 1px solid rgba(240,237,230,.2);
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: none; transition: border-color .2s, background .2s; flex-shrink: 0;
    }
    #lb-prev:hover, #lb-next:hover { border-color: var(--red); background: rgba(227,62,62,.12); }
    #lb-prev svg, #lb-next svg {
      width: 14px; height: 14px; stroke: var(--white); stroke-width: 1.5;
      fill: none; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
    }
    .process-section-grid img { cursor: none; transition: transform .3s ease; }
    .process-section-grid img:hover { transform: scale(1.02); }
    .process-body {
      font-family: "Elms Sans", sans-serif; font-optical-sizing: auto;
      font-size: 1.05rem; line-height: 1.85; color: rgba(240,237,230,.72); max-width: 680px;
    }

    /* ─── Playground Grid ─── */
    .playground-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
    }
    .playground-grid .work-card { aspect-ratio: 1 / 1; }
    .playground-section-label {
      padding: 48px 52px 20px;
      font-size: .62rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--red); border-top: 1px solid var(--line);
    }

    /* ─── Filter Tabs ─── */
    .header-row { display: flex; justify-content: space-between; align-items: flex-end; }
    .filter-tabs { display: flex; gap: 28px; padding-bottom: 14px; }
    .ftab {
      background: none; border: none; cursor: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .62rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); position: relative; padding-bottom: 4px;
      transition: color .2s ease;
    }
    .ftab::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px; background: var(--red); transition: width .3s ease;
    }
    .ftab.active { color: var(--red); }
    .ftab.active::after { width: 100%; }
    .ftab:hover:not(.active) { color: var(--white); }
    .works-empty {
      grid-column: 1 / -1; padding: 120px 52px;
      font-size: .62rem; letter-spacing: .25em; text-transform: uppercase;
      color: #333; text-align: center;
    }

    /* ─── Scroll Reveal ─── */
    .reveal { opacity: 0; transform: translateY(36px); transition: opacity .8s ease, transform .8s ease; }
    .reveal.vis { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      nav { padding: 20px 24px; }
      .page-header { padding: 120px 24px 60px; }
      .header-row { flex-direction: column; align-items: flex-start; gap: 24px; }
      .filter-tabs { flex-wrap: wrap; gap: 16px 24px; padding-bottom: 0; }
      .w2-grid { grid-template-columns: 1fr; }
      .detail-body { padding: 40px 24px; }
      .detail-topbar { padding: 18px 24px; }
      .detail-info { grid-template-columns: 1fr; gap: 36px; }
      .nav-links { gap: 24px; }
      footer, .detail-footer { padding: 60px 24px 32px; }
      .foot-main { grid-template-columns: 1fr; gap: 48px; }
      .detail-more-projects { padding: 40px 24px 60px; margin-top: 24px; }
      .detail-illustration img { max-width: 180px; width: 15%; }
      .dmp-item:first-child { padding-right: 24px; }
      .dmp-item:last-child { padding-left: 24px; }
      .dmp-title { overflow-wrap: break-word; }

  const PROJECT_PAGES = [
    'work-new-york-pulse.html',
    'work-milky-way-home.html',
    'work-good-bad-ugly.html',
    'work-adelphi.html',
    'work-oreo.html',
    'work-nike.html',
    'work-7-kinds-of-rest.html',
    'work-world-athletics.html',
    'work-christmasland.html',
    'work-taoyuan.html',
    'work-love-on-shoestring.html',
    'work-taipei-esports.html',
    'work-whos-the-boss.html',
  ];

  const playgroundItems = [
    { type: 'image', title: 'Sushiro', src: 'Project file/Playground/sushiro.png' },
    { type: 'video', title: 'Memory', src: 'Project file/Playground/memory.mp4' },
    { type: 'video', title: 'Me Time', src: 'Project file/Playground/Me time.mp4' },
    { type: 'video', title: 'Shower', src: 'Project file/Playground/Shower.mp4' },
    { type: 'video', title: 'Mario', src: 'Project file/Playground/Mario.mp4' },
    { type: 'video', title: 'L', src: 'Project file/Playground/L.mp4' },
    { type: 'video', title: 'N', src: 'Project file/Playground/N.mp4' },
  ];

  let _firstRender = true;
  function _applyFade(el) {
    if (_firstRender) return;
    el.classList.remove('grid-fade');
    void el.offsetWidth; // force reflow to restart animation
    el.classList.add('grid-fade');
  }

  function renderWorks(filter) {
    document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
    const grid = document.getElementById('works-grid');
    const laSection = document.getElementById('live-action-section');
    const pgSection = document.getElementById('playground-section');
    const showWorks = filter === 'all' || filter === 'works';
    const showLa    = filter === 'all' || filter === 'live-action';
    const showPg    = filter === 'all' || filter === 'playground';

    const worksItems  = projects.map((p, i) => ({ p, i })).filter(({ p }) => p.category === 'works');
    const laItems     = projects.map((p, i) => ({ p, i })).filter(({ p }) => p.category === 'live-action');
    const totalCount  = (showWorks ? worksItems.length : 0)
                      + (showLa   ? laItems.length     : 0)
                      + (showPg   ? playgroundItems.length : 0);
    document.getElementById('works-count').textContent =
      `${String(totalCount).padStart(2,'0')} Projects`;

    // ── Card builder
    const makeCard = ({ p, i }) => {
      const vimeoSrc = p.vimeoId || (p.vimeoIds && p.vimeoIds[0]) || '';
      const thumb = p.thumb
        ? `<img class="work-thumb${p.thumbZoom ? ' work-thumb--zoom' : ''}" src="${p.thumb}" alt="${p.title}" loading="lazy">`
        : `<div class="work-placeholder" data-vimeo="${vimeoSrc}" data-title="${p.title}"></div>`;
      return `<div class="work-card" onclick="location.href=PROJECT_PAGES[${i}]">
        ${thumb}
        <div class="work-card-overlay"><div class="work-meta">
          <div class="work-num">${p.num}</div>
          <div class="work-title">${p.title}</div>
          <div class="work-type">${p.type}</div>
        </div></div>
      </div>`;
    };
    const bindHover = (el) => el.querySelectorAll('.work-card').forEach(c => {
      c.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      c.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });
    const fetchVimeoThumbs = (container) => {
      container.querySelectorAll('[data-vimeo]').forEach(el => {
        const vid = el.dataset.vimeo;
        if (!vid) return;
        fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${vid}&width=800`)
          .then(r => r.json())
          .then(d => {
            const img = document.createElement('img');
            img.className = 'work-thumb';
            img.src = d.thumbnail_url;
            img.alt = el.dataset.title || ''; img.loading = 'lazy';
            el.replaceWith(img);
          }).catch(() => {});
      });
    };

    // ── Works grid
    if (!showWorks || worksItems.length === 0) {
      grid.innerHTML = ''; grid.style.display = 'none';
    } else {
      grid.style.display = '';
      grid.innerHTML = `<div class="w2-grid">${worksItems.map(it => makeCard(it)).join('')}</div>`;
      _applyFade(grid);
      bindHover(grid);
      fetchVimeoThumbs(grid);
    }

    // ── Live Action Motion grid
    if (!showLa || laItems.length === 0) {
      laSection.style.display = 'none'; laSection.innerHTML = '';
    } else {
      laSection.style.display = '';
      laSection.innerHTML =
        (filter === 'all' ? '<div class="playground-section-label">Live Action Motion /</div>' : '') +
        `<div class="w2-grid">${laItems.map(it => makeCard(it)).join('')}</div>`;
      _applyFade(laSection);
      bindHover(laSection);
      fetchVimeoThumbs(laSection);
    }

    // ── Playground square grid
    if (!showPg) { pgSection.style.display = 'none'; pgSection.innerHTML = ''; return; }
    pgSection.style.display = '';
    pgSection.innerHTML = `
      ${filter === 'all' ? '<div class="playground-section-label">Playground /</div>' : ''}
      <div class="playground-grid">
        ${playgroundItems.map((item, i) => {
          const thumb = item.type === 'video'
            ? `<video class="work-thumb" src="${item.src}" autoplay muted loop playsinline></video>`
            : `<img class="work-thumb" src="${item.src}" alt="${item.title}" loading="lazy">`;
          return `<div class="work-card" onclick="playgroundLbOpen(${i})">
            ${thumb}
            <div class="work-card-overlay"><div class="work-meta">
              <div class="work-num">Playground</div>
              <div class="work-title">${item.title}</div>
              <div class="work-type">${item.type === 'video' ? 'Video' : 'Image'}</div>
            </div></div>
          </div>`;
        }).join('')}
      </div>`;
    _applyFade(pgSection);
    pgSection.querySelectorAll('.work-card').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });
    _firstRender = false;
  }

  renderWorks('all');
  _firstRender = false;

  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', () => renderWorks(btn.dataset.filter));
    btn.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    btn.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  const cur = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
    ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: .12 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // ── Playground Lightbox ──
  let _pgIdx = 0;
  const lbEl    = document.getElementById('lightbox');
  const lbImg   = document.getElementById('lb-img');
  const lbVideo = document.getElementById('lb-video');
  const lbGrpEl = document.getElementById('lb-group');
  const lbCntEl = document.getElementById('lb-counter');
  const lbPrevEl = document.getElementById('lb-prev');
  const lbNextEl = document.getElementById('lb-next');

  function _lbShowMedia(src, type) {
    if (type === 'video') {
      lbImg.style.display = 'none'; lbImg.classList.remove('lb-vis'); lbImg.src = '';
      lbVideo.style.display = 'block';
      lbVideo.src = src; lbVideo.load(); lbVideo.play().catch(() => {});
    } else {
      lbVideo.style.display = 'none'; lbVideo.pause(); lbVideo.src = '';
      lbImg.style.display = 'block'; lbImg.src = src;
      requestAnimationFrame(() => requestAnimationFrame(() => lbImg.classList.add('lb-vis')));
    }
  }

  function playgroundLbOpen(idx) {
    _pgIdx = idx;
    const item = playgroundItems[idx];
    lbGrpEl.textContent = 'Playground';
    lbCntEl.textContent = `${idx + 1} / ${playgroundItems.length}`;
    lbPrevEl.style.visibility = 'visible'; lbNextEl.style.visibility = 'visible';
    lbEl.classList.add('lb-open');
    _lbShowMedia(item.src, item.type);
  }

  function lbClose() {
    lbImg.classList.remove('lb-vis'); lbEl.classList.remove('lb-open');
    setTimeout(() => { lbImg.src = ''; lbVideo.pause(); lbVideo.src = ''; lbVideo.style.display = 'none'; }, 380);
  }

  function lbChange(delta) {
    _pgIdx = (_pgIdx + delta + playgroundItems.length) % playgroundItems.length;
    lbImg.classList.remove('lb-vis'); lbVideo.pause();
    setTimeout(() => {
      const item = playgroundItems[_pgIdx];
      lbCntEl.textContent = `${_pgIdx + 1} / ${playgroundItems.length}`;
      _lbShowMedia(item.src, item.type);
    }, 200);
  }

  document.getElementById('lb-close').addEventListener('click', lbClose);
  lbPrevEl.addEventListener('click', () => lbChange(-1));
  lbNextEl.addEventListener('click', () => lbChange(1));
  lbEl.addEventListener('click', e => { if (e.target === lbEl || e.target.id === 'lb-stage') lbClose(); });
  document.querySelectorAll('#lb-close, #lb-prev, #lb-next').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && lbEl.classList.contains('lb-open')) lbClose();
    if (e.key === 'ArrowLeft'  && lbEl.classList.contains('lb-open')) lbChange(-1);
    if (e.key === 'ArrowRight' && lbEl.classList.contains('lb-open')) lbChange(1);
  });

  // ── Redirect legacy ?open=N links to individual project pages ──
  const _autoOpen = new URLSearchParams(window.location.search).get('open');
  if (_autoOpen !== null) {
    const _idx = parseInt(_autoOpen, 10);
    if (!isNaN(_idx) && _idx >= 0 && _idx < PROJECT_PAGES.length) {
      window.location.replace(PROJECT_PAGES[_idx]);
    }
  }

</script>
